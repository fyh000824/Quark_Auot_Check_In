name: Quark签到

on:
  schedule:
    - cron: '0 1 * * *'   # 北京时间 09:00
    - cron: '0 5 * * *'   # 北京时间 13:00
  workflow_dispatch:

jobs:
  check-if-already-signed:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 恢复签到成功记录缓存
        id: cache-success-restore
        uses: actions/cache@v4
        with:
          path: .last_success_date
          key: last-success-marker

      - name: 判断是否已签到
        id: check
        run: |
          current_date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "当前北京时间: $current_date"
          if [ -f .last_success_date ]; then
            last_date=$(cat .last_success_date)
            echo "上次签到日期: $last_date"
            if [ "$last_date" = "$current_date" ]; then
              echo "skip=false" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "skip=true" >> "$GITHUB_OUTPUT"

      # 已签到跳过通知
      - name: Bark 今日已签到跳过
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -s "https://api.day.app/5JUA4LkHRhW3gRQ85JV5t4/Quark签到/📅 今日已经签到，本次跳过"

  sign-in:
    needs: check-if-already-signed
    if: needs.check-if-already-signed.outputs.skip == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 随机延迟（早上）
        if: github.event.schedule == '0 1 * * *'
        run: |
          delay=$((RANDOM % 60))
          sleep $delay
      - name: 随机延迟（下午/手动触发）
        if: github.event.schedule == '0 5 * * *' || github.event_name == 'workflow_dispatch'
        run: |
          delay=$((RANDOM % 30))
          sleep $delay

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install requests

      - name: 执行签到脚本
        id: run_task
        continue-on-error: true
        env:
          COOKIE_QUARK: ${{ secrets.COOKIE_QUARK }}
        run: python checkIn_Quark.py

      # 签到成功通知
      - name: Bark 签到成功
        if: steps.run_task.outcome == 'success'
        run: |
          curl -s "https://api.day.app/5JUA4LkHRhW3gRQ85JV5t4/Quark签到/✅ 夸克签到执行成功"

      # 签到失败 + 带回错误信息
      - name: 获取错误日志并推送Bark
        if: steps.run_task.outcome == 'failure'
        run: |
          log=$(tail -n 20 /home/runner/work/_temp/*.log 2>/dev/null | head -n 5)
          msg=${log:-脚本运行异常，自行查看工作流日志}
          curl -s "https://api.day.app/5JUA4LkHRhW3gRQ85JV5t4/Quark签到/❌签到失败：${msg}"

      - name: 标记今天签到成功
        if: steps.run_task.outcome == 'success'
        run: |
          date_str=$(TZ='Asia/Shanghai' date '+%Y-%m-%d')
          echo "$date_str" > .last_success_date

      - name: 保存成功记录到缓存
        if: steps.run_task.outcome == 'success'
        uses: actions/cache@v4
        with:
          path: .last_success_date
          key: last-success-marker

      - name: 清理旧的工作流记录
        uses: Mattraks/delete-workflow-runs@v2
        if: always()
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 60
